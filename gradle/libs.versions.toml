[versions]
# SDK Versions
compileSdk = "36"
minSdk     = "24"
targetSdk  = "36"

# ── Toolchain ───────────────────────────────────────────────────
# AGP 9.x ships with built-in Kotlin — kotlin-android plugin no longer needed
agp                  = "9.1.0"
kotlin               = "2.3.10"
ksp                  = "2.3.5"          # pinned — do not upgrade
hilt                 = "2.59.2"
kotlin-serialization = "2.3.10"         # must stay in sync with kotlin

# ── Compose & Material ──────────────────────────────────────────
composeBom     = "2026.02.01"
material3      = "1.5.0-alpha17"        # M3 Expressive — keep alpha for LoadingIndicator etc.
dynamicColor   = "1.0.0"
graphicsShapes = "1.0.1"
animation      = "1.1.0"

# ── AndroidX ────────────────────────────────────────────────────
appcompat               = "1.7.1"
glance                  = "1.1.1"
core-ktx                = "1.17.0"
annotation              = "1.9.1"
lifecycle               = "2.9.1"
activity-compose        = "1.10.1"
room                    = "2.8.4"
navigation-compose      = "2.9.5"
datastore               = "1.1.7"
biometric               = "1.4.0-alpha05"
work                    = "2.11.0"
hilt-navigation-compose = "1.3.0"
hilt-work               = "1.3.0"
hilt-compiler           = "1.3.0"
google-fonts            = "1.7.8"
paging                  = "3.4.1"
documentfile            = "1.1.0"
core-splashscreen       = "1.0.1"
security-crypto         = "1.1.0-alpha06"

# ── Image Loading (MAJOR: Coil 2 → Coil 3) ─────────────────────
# Group ID changes from io.coil-kt  →  io.coil-kt.coil3
# Package  changes from coil        →  coil3
coil = "3.3.0"

# ── Network ─────────────────────────────────────────────────────
retrofit = "3.0.0"
okhttp   = "5.0.0-alpha.14"    # first stable-ish alpha with full HTTP/3 support

# ── Kotlinx ─────────────────────────────────────────────────────
kotlinx-serialization = "1.8.1"

# ── Third-party ─────────────────────────────────────────────────
jsoup = "1.21.2"
gson  = "2.13.1"   # keep for now; remove after Retrofit migration in Phase 4

# ── Google Services ─────────────────────────────────────────────
play-services-auth        = "21.3.0"
google-api-client         = "2.8.1"
google-api-services-drive = "v3-rev20251210-2.0.0"
google-auth-library        = "1.33.1"
app-update                = "2.1.0"
billing                   = "7.1.1"
play-review               = "2.0.2"

# ── ACRA ────────────────────────────────────────────────────────
acra = "5.13.1"

# ── Testing ─────────────────────────────────────────────────────
junit       = "4.13.2"
junit-ext   = "1.2.1"
espresso    = "3.6.1"

[libraries]
# Material 3 Expressive MAIN dependencies
compose-bom          = { group = "androidx.compose",           name = "compose-bom",                      version.ref = "composeBom" }
compose-ui           = { group = "androidx.compose.ui",        name = "ui" }
compose-ui-graphics  = { group = "androidx.compose.ui",        name = "ui-graphics" }
compose-ui-tooling   = { group = "androidx.compose.ui",        name = "ui-tooling" }
compose-ui-preview   = { group = "androidx.compose.ui",        name = "ui-tooling-preview" }
compose-foundation   = { group = "androidx.compose.foundation",name = "foundation" }
compose-animation    = { group = "androidx.compose.animation", name = "animation" }

material3            = { group = "androidx.compose.material3", name = "material3",                        version.ref = "material3" }
material3-window     = { group = "androidx.compose.material3", name = "material3-window-size-class",      version.ref = "material3" }
material3-adaptive   = { group = "androidx.compose.material3", name = "material3-adaptive-navigation-suite", version.ref = "material3" }

icons-core           = { group = "androidx.compose.material",  name = "material-icons-core" }
icons-extended       = { group = "androidx.compose.material",  name = "material-icons-extended" }

dynamic-color        = { group = "com.google.android.material",name = "material",                         version.ref = "dynamicColor" }
graphics-shapes      = { group = "androidx.graphics",          name = "graphics-shapes",                  version.ref = "graphicsShapes" }
dynamic-animation    = { group = "androidx.dynamicanimation",  name = "dynamicanimation-ktx",             version.ref = "animation" }

# ACRA
acra-http = { group = "ch.acra", name = "acra-http", version.ref = "acra" }
acra-toast = { group = "ch.acra", name = "acra-toast", version.ref = "acra" }
acra-notification = { group = "ch.acra", name = "acra-notification", version.ref = "acra" }
acra-dialog = { group = "ch.acra", name = "acra-dialog", version.ref = "acra" }
acra-core = { group = "ch.acra", name = "acra-core", version.ref = "acra" }

# AndroidX
androidx-appcompat = { group = "androidx.appcompat", name = "appcompat", version.ref = "appcompat" }
androidx-core-splashscreen = { group = "androidx.core", name = "core-splashscreen", version.ref = "core-splashscreen" }
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "core-ktx" }
androidx-annotation = { group = "androidx.annotation", name = "annotation", version.ref = "annotation" }
androidx-lifecycle-runtime-ktx = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "lifecycle" }
androidx-lifecycle-runtime-compose = { group = "androidx.lifecycle", name = "lifecycle-runtime-compose", version.ref = "lifecycle" }
androidx-lifecycle-viewmodel-compose = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-compose", version.ref = "lifecycle" }
androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activity-compose" }
androidx-compose-runtime = { group = "androidx.compose.runtime", name = "runtime" }
androidx-navigation-compose = { group = "androidx.navigation", name = "navigation-compose", version.ref = "navigation-compose" }
androidx-datastore-preferences = { group = "androidx.datastore", name = "datastore-preferences", version.ref = "datastore" }
androidx-datastore-core = { group = "androidx.datastore", name = "datastore-core", version.ref = "datastore" }
androidx-room-runtime = { group = "androidx.room", name = "room-runtime", version.ref = "room" }
androidx-room-ktx = { group = "androidx.room", name = "room-ktx", version.ref = "room" }
androidx-room-compiler = { group = "androidx.room", name = "room-compiler", version.ref = "room" }
androidx-biometric = { group = "androidx.biometric", name = "biometric", version.ref = "biometric" }
androidx-work-runtime-ktx = { group = "androidx.work", name = "work-runtime-ktx", version.ref = "work" }
androidx-hilt-navigation-compose = { group = "androidx.hilt", name = "hilt-navigation-compose", version.ref = "hilt-navigation-compose" }
androidx-hilt-work = { group = "androidx.hilt", name = "hilt-work", version.ref = "hilt-work" }
androidx-hilt-compiler = { group = "androidx.hilt", name = "hilt-compiler", version.ref = "hilt-compiler" }
androidx-ui-text = { group = "androidx.compose.ui", name = "ui-text" }
androidx-ui-text-google-fonts = { group = "androidx.compose.ui", name = "ui-text-google-fonts" }
androidx-ui-test-manifest = { group = "androidx.compose.ui", name = "ui-test-manifest" }
androidx-ui-test-junit4 = { group = "androidx.compose.ui", name = "ui-test-junit4" }
androidx-ui-test-junit4-android = { group = "androidx.compose.ui", name = "ui-test-junit4-android" }
androidx-documentfile = { group = "androidx.documentfile", name = "documentfile", version.ref = "documentfile" }
androidx-glance-appwidget = { group = "androidx.glance", name = "glance-appwidget", version.ref = "glance" }
androidx-glance-material3 = { group = "androidx.glance", name = "glance-material3", version.ref = "glance" }
androidx-paging-runtime = { group = "androidx.paging", name = "paging-runtime", version.ref = "paging" }
androidx-paging-compose = { group = "androidx.paging", name = "paging-compose", version.ref = "paging" }
androidx-room-paging = { group = "androidx.room", name = "room-paging", version.ref = "room" }
androidx-security-crypto = { group = "androidx.security", name = "security-crypto", version.ref = "security-crypto" }

# Kotlin
kotlinx-serialization-json = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "kotlinx-serialization" }
kotlinx-collections-immutable = { group = "org.jetbrains.kotlinx", name = "kotlinx-collections-immutable", version.ref = "kotlinx-collections-immutable" }

# Hilt
hilt-android = { group = "com.google.dagger", name = "hilt-android", version.ref = "hilt" }
hilt-android-compiler = { group = "com.google.dagger", name = "hilt-android-compiler", version.ref = "hilt" }

# Network & Utils
coil-compose        = { group = "io.coil-kt.coil3", name = "coil-compose",         version.ref = "coil" }
coil-network-okhttp = { group = "io.coil-kt.coil3", name = "coil-network-okhttp",  version.ref = "coil" }
jsoup = { group = "org.jsoup", name = "jsoup", version.ref = "jsoup" }
gson = { group = "com.google.code.gson", name = "gson", version.ref = "gson" }
retrofit = { group = "com.squareup.retrofit2", name = "retrofit", version.ref = "retrofit" }
retrofit-converter-gson = { group = "com.squareup.retrofit2", name = "converter-gson", version.ref = "retrofit" }
retrofit-kotlinx-serialization-json = { group = "com.squareup.retrofit2", name = "converter-kotlinx-serialization", version.ref = "retrofit" }
okhttp = { group = "com.squareup.okhttp3", name = "okhttp", version.ref = "okhttp" }
okhttp-logging = { group = "com.squareup.okhttp3", name = "logging-interceptor", version.ref = "okhttp" }

# Google Services & APIs
play-services-auth = { group = "com.google.android.gms", name = "play-services-auth", version.ref = "play-services-auth" }
google-api-client-android = { group = "com.google.api-client", name = "google-api-client-android", version.ref = "google-api-client" }
google-api-services-drive = { group = "com.google.apis", name = "google-api-services-drive", version.ref = "google-api-services-drive" }
google-auth-library-oauth2-http = { group = "com.google.auth", name = "google-auth-library-oauth2-http", version.ref = "google-auth-library" }
app-update = { group = "com.google.android.play", name = "app-update", version.ref = "app-update" }
app-update-ktx = { group = "com.google.android.play", name = "app-update-ktx", version.ref = "app-update" }
billing = { group = "com.android.billingclient", name = "billing-ktx", version.ref = "billing" }
play-review = { group = "com.google.android.play", name = "review", version.ref = "play-review" }
play-review-ktx = { group = "com.google.android.play", name = "review-ktx", version.ref = "play-review" }


# Testing
junit = { group = "junit", name = "junit", version.ref = "junit" }
androidx-junit = { group = "androidx.test.ext", name = "junit", version.ref = "junit-ext" }
androidx-espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "espresso" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin-serialization" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
hilt = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }
