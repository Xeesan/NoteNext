<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6200ee" />
      <stop offset="50%" stop-color="#4a00b0" />
      <stop offset="100%" stop-color="#00c853" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- decorative blurred circles -->
  <circle cx="1050" cy="120" r="180" fill="#ffffff" opacity="0.08" />
  <circle cx="120" cy="540" r="140" fill="#ffffff" opacity="0.06" />

  <!-- logo badge -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="#FEC928" />
    <rect x="14" y="18" width="40" height="6" rx="2" fill="#202020" />
    <rect x="14" y="32" width="52" height="6" rx="2" fill="#202020" />
    <rect x="14" y="46" width="32" height="6" rx="2" fill="#202020" />
    <rect x="14" y="60" width="46" height="6" rx="2" fill="#202020" />
    <path d="M58 14 L70 26 L40 56 L28 56 L28 44 Z" fill="#F68EA3" />
  </g>

  <text x="180" y="135" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="32" font-weight="700" fill="#ffffff">NoteNext</text>

  <!-- main heading -->
  <text x="80" y="280" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="84" font-weight="800" fill="#ffffff" letter-spacing="-2">Notes that never</text>
  <text x="80" y="370" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="84" font-weight="800" fill="#ffffff" letter-spacing="-2">leave your device.</text>

  <!-- subhead -->
  <text x="80" y="445" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="400" fill="#ffffff" opacity="0.85">Private, local-first note-taking for Android.</text>
  <text x="80" y="480" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="400" fill="#ffffff" opacity="0.85">Material 3 Expressive · AES-256 · Open source.</text>

  <!-- chips -->
  <g transform="translate(80, 530)">
    <rect x="0" y="0" width="200" height="46" rx="23" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.3" />
    <text x="100" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Local-First</text>

    <rect x="220" y="0" width="240" height="46" rx="23" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.3" />
    <text x="340" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Material 3 Expressive</text>

    <rect x="480" y="0" width="190" height="46" rx="23" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.3" />
    <text x="575" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Open Source</text>
  </g>

  <!-- domain ribbon -->
  <text x="1120" y="600" text-anchor="end" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#ffffff" opacity="0.6">notenext.suvojeetsengupta.in</text>
</svg>
