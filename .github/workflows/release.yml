name: Manual Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.4.0

    - name: Extract Version Info
      id: version_info
      run: |
        VERSION_NAME=$(grep "appVersionName=" gradle.properties | cut -d'=' -f2)
        VERSION_CODE=$(grep "appVersionCode=" gradle.properties | cut -d'=' -f2)
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Generate Professional Release Notes
      id: release_notes
      shell: python
      run: |
        import json
        import os

        version = os.environ.get('VERSION_NAME')
        try:
            with open('changelog.json', 'r') as f:
                data = json.load(f)
            
            release = next((r for r in data['releases'] if r['version'] == version), None)
            
            if release:
                body = f"## Release v{version} ({release['date']})\n\n"
                
                # Group by type
                features = [item for item in release['items'] if item['type'] == 'FEATURE']
                improvements = [item for item in release['items'] if item['type'] == 'IMPROVEMENT']
                fixes = [item for item in release['items'] if item['type'] == 'FIX']
                
                if features:
                    body += "### New Features\n"
                    for item in features:
                        body += f"- **{item['title']}**: {item['description']}\n"
                    body += "\n"
                
                if improvements:
                    body += "### Improvements\n"
                    for item in improvements:
                        body += f"- **{item['title']}**: {item['description']}\n"
                    body += "\n"
                    
                if fixes:
                    body += "### Bug Fixes\n"
                    for item in fixes:
                        body += f"- **{item['title']}**: {item['description']}\n"
                    body += "\n"
                
                body += "---\n"
                body += "### Developer Information\n"
                body += "- **Lead Developer**: Suvojeet Sengupta\n"
                body += "- **GitHub**: [@suvojeet-sengupta](https://github.com/suvojeet-sengupta)\n"
                body += "- **Build Version**: " + os.environ.get('VERSION_CODE') + "\n\n"
                body += "### Links\n"
                body += f"- [Download Full Changelog](https://raw.githubusercontent.com/{os.environ.get('GITHUB_REPOSITORY')}/main/changelog.json)\n"
                body += f"- [Project Repository](https://github.com/{os.environ.get('GITHUB_REPOSITORY')})\n"
                
                with open('release_body.md', 'w') as f:
                    f.write(body)
            else:
                with open('release_body.md', 'w') as f:
                    f.write(f"Automated release for version {version}")
        except Exception as e:
            with open('release_body.md', 'w') as f:
                f.write(f"Automated release for version {version}\n\nError parsing changelog: {str(e)}")

    - name: Decode Keystore
      run: |
        base64 --decode my-release-key.keystore.base64 > my-release-key.keystore


    - name: Build and Sign Release (APK & AAB)
      run: gradle assembleRelease bundleRelease --parallel --no-daemon
      env:
        KEYSTORE_PATH: "my-release-key.keystore"
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GROQ_API_1: ${{ secrets.GROQ_API_1 }}

    - name: Determine Artifact Paths
      id: paths
      run: |
        APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
        AAB_FILE=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
        echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV
        echo "AAB_PATH=$AAB_FILE" >> $GITHUB_ENV

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ env.VERSION_NAME }}
        name: Release v${{ env.VERSION_NAME }}
        body_path: release_body.md
        draft: false
        prerelease: false
        files: |
          ${{ env.APK_PATH }}
          ${{ env.AAB_PATH }}
        overwrite: true
