name: Website Build & Deploy

# Triggers ONLY on changes inside /website (or this workflow file).
# Pushes that touch only the Android app, gradle files, etc. will NOT
# run this workflow — and changes here will NOT run the Android build
# (development.yml is configured to ignore /website).
on:
  push:
    branches: [ "main" ]
    paths:
      - 'website/**'
      - 'changelog.json'                 # rebuild when the in-app changelog updates
      - '.github/workflows/website.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'
  workflow_dispatch:

# Lock concurrent runs to the same ref so a fast follow-up commit cancels
# the in-flight build instead of queueing two deploys for the same branch.
concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist
          retention-days: 7
          if-no-files-found: error

  # Optional CI deploy to Cloudflare Pages.
  # Only runs on push to main, and only if both secrets are set:
  #   - CLOUDFLARE_API_TOKEN  (Pages: Edit permission)
  #   - CLOUDFLARE_ACCOUNT_ID
  # If you'd rather use Cloudflare's built-in Git integration (recommended,
  # since the main site already uses it), leave these secrets unset and this
  # job will skip silently — Cloudflare Pages will deploy directly from GitHub.
  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://notenext.suvojeetsengupta.in
    defaults:
      run:
        working-directory: website
    steps:
      - name: Check for Cloudflare credentials
        id: check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "✅ Cloudflare credentials present — will deploy."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set."
            echo "   Skipping deploy — relying on Cloudflare's Git integration instead."
          fi

      - name: Checkout
        if: steps.check.outputs.deploy == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.check.outputs.deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Download build artifact
        if: steps.check.outputs.deploy == 'true'
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.deploy == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: website
          command: pages deploy dist --project-name=notenext-website --branch=main
