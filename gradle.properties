android.useAndroidX=true
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC -Dfile.encoding=UTF-8
ksp.useKSP2=true

# Gradle optimizations
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.vfs.watch=true

# Configuration Cache (Helps with configuration time in subsequent builds)
org.gradle.configuration-cache=true

# Non-transitive R classes (Speeds up compilation by not regenerating R classes for dependent modules)
android.nonTransitiveRClass=true

# Kotlin optimizations
kotlin.incremental=true
# Heap size for the Kotlin compiler
kotlin.daemon.jvmargs=-Xmx2g

# Disable some features to save time if not used (Uncomment if sure they aren't needed)
# android.defaults.buildfeatures.renderscript=false
# android.defaults.buildfeatures.aidl=false
# android.defaults.buildfeatures.shaders=false

# Non-final resource IDs can help with incremental compilation in libraries
android.nonFinalResIds=true
android.enableJetifier=false

# App Versioning
appVersionCode=30
appVersionName=1.4.0
